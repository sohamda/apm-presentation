<template id="slides">

<section class="slide title-slide">
  <div class="eyebrow">Microsoft · Open Source</div>
  <h1>APM</h1>
  <div class="sub">A dependency manager for AI agents. <strong>Portable</strong> by manifest, <strong>secure</strong> by default, <strong>governed</strong> by policy — and how it pairs with <strong>AgentRC</strong>.</div>
  <div class="meta">
    <span><strong>For:</strong> Developers &amp; Architects</span>
    <span><strong>Duration:</strong> 30 min + Q&amp;A</span>
    <span><strong>Speaker:</strong> Soham Dasgupta · Sr. Partner Solution Architect</span>
  </div>
</section>

<section class="slide">
  <div class="eyebrow">The problem</div>
  <h1>Every agent. Every dev. Every machine. Different setup.</h1>
  <div class="two-col" style="margin-top: 12px;">
    <div class="col">
      <h2>What teams ship today</h2>
      <ul>
        <li>A README that says "install these extensions"</li>
        <li>A copy-pasted <code>copilot-instructions.md</code></li>
        <li>Ad-hoc MCP server configs in three different files</li>
        <li>Skills, prompts, and rules duplicated per agent (Copilot today, maybe Claude or Cursor tomorrow)</li>
        <li>No version pinning. No integrity. No reproducibility.</li>
      </ul>
    </div>
    <div class="col">
      <h2>The result</h2>
      <ul>
        <li>"It works on my agent" 🤷</li>
        <li>Drift between developers</li>
        <li>Silent context rot as the repo evolves</li>
        <li>No way to ship agent context as a versioned artifact</li>
        <li>No security boundary around prompts &mdash; which <em>are</em> programs for an LLM</li>
      </ul>
    </div>
  </div>
</section>

<section class="slide">
  <div class="eyebrow">The idea</div>
  <h1>What if agent context had a <span style="color:var(--cp-accent)">package.json</span>?</h1>
  <h3>One manifest. One install. Every agent, configured.</h3>
  <div class="full">
    <pre class="code"><span class="cmt"># apm.yml — ships with your repo</span>
<span class="kw">name</span>: your-project
<span class="kw">version</span>: 1.0.0
<span class="kw">dependencies</span>:
  <span class="kw">apm</span>:
    <span class="cmt"># Skills, prompts, agents, plugins — from any git repo, version-pinned</span>
    - github/awesome-copilot/skills/review-and-refactor
    - github/awesome-copilot/plugins/context-engineering<span class="str">#v2.1</span>
    - microsoft/apm-sample-package<span class="str">#v1.0.0</span>
  <span class="kw">mcp</span>:
    <span class="cmt"># MCP servers governed by the same manifest (registry entries are bare strings)</span>
    - io.github.github/github-mcp-server</pre>
    <pre class="terminal"><span class="muted">$</span> <span class="prompt">git clone &lt;repo&gt; &amp;&amp; cd &lt;repo&gt;</span>
<span class="muted">$</span> <span class="prompt">apm install</span>
<span class="info">→</span> resolving 14 packages…
<span class="info">→</span> writing .github/copilot-instructions.md
<span class="info">→</span> writing .github/prompts/, .github/instructions/
<span class="info">→</span> writing AGENTS.md (read by Claude, Cursor, Codex, …)
<span class="ok">✓ every agent in the repo is configured</span></pre>
  </div>
</section>

<section class="slide">
  <div class="eyebrow">The three promises</div>
  <h1>What APM guarantees</h1>
  <div class="pillars">
    <div class="pillar">
      <h4>1. Portable by manifest</h4>
      <p>One <code>apm.yml</code> describes every primitive — instructions, skills, prompts, agents, hooks, plugins, MCP servers. <code>apm install</code> reproduces the same setup across every harness on every machine. <code>apm.lock.yaml</code> pins the resolved tree.</p>
    </div>
    <div class="pillar">
      <h4>2. Secure by default</h4>
      <p>Agent context is executable in effect — a prompt is a program for an LLM. Every install scans for hidden Unicode, pins content hashes, and gates transitive MCP servers behind trust prompts.</p>
    </div>
    <div class="pillar">
      <h4>3. Governed by policy</h4>
      <p><code>apm-policy.yml</code> is enforced at install time, including transitive MCP. Tighten-only inheritance flows enterprise → org → repo.</p>
    </div>
  </div>
</section>

<section class="slide">
  <div class="eyebrow">Primitives</div>
  <h1>What APM packages can contain</h1>
  <div class="grid" style="margin-top: 8px;">
    <div class="card"><h4>Instructions</h4><p>Repo conventions, architecture, do/don't rules. Rendered into <code>.github/copilot-instructions.md</code> (and <code>AGENTS.md</code> for non-Copilot harnesses).</p></div>
    <div class="card"><h4>Prompts</h4><p>Slash-command prompts. Deployed to <code>.github/prompts/</code> for Copilot.</p></div>
    <div class="card"><h4>Agents</h4><p>Single-purpose agent files (e.g. <code>api-architect.agent.md</code>). Deployed to <code>.github/agents/</code>.</p></div>
    <div class="card"><h4>Skills</h4><p>Reusable capabilities in the Agent Skills format (<code>SKILL.md</code>). Drop-in from <code>anthropics/skills</code> or any repo.</p></div>
    <div class="card"><h4>Hooks &amp; Commands</h4><p>Lifecycle hooks and CLI commands the agent can invoke. Governed by policy.</p></div>
    <div class="card"><h4>MCP servers</h4><p>Declared in the same manifest. Policy-checked and trust-gated before they touch disk.</p></div>
  </div>
  <p style="font-size:13px; color:var(--cp-text-muted); margin-top: 10px;">Eight primitive types in total (instructions, prompts, agents, skills, hooks, commands, plugins, MCP). Plugins are a bundle of the others — see slide 9.</p>
</section>

    <div class="demo-toolbar">

<section class="slide">
  <div class="eyebrow">Compile targets</div>
  <h1>Copilot-first. Portable to the rest.</h1>
  <h3>The same packages render to whichever harness your team uses.</h3>
  <div class="flow">
    <div class="node accent">apm.yml</div>
    <span class="arrow">→</span>
    <div class="node accent">apm install</div>
    <span class="arrow">→</span>
    <div class="node" style="border-color:var(--cp-accent); font-weight:600;">GitHub Copilot</div>
    <span class="arrow">+</span>
    <div class="node" style="font-size:11px;">Claude Code</div>
    <div class="node" style="font-size:11px;">Cursor</div>
    <div class="node" style="font-size:11px;">OpenCode</div>
    <div class="node" style="font-size:11px;">Codex</div>
    <div class="node" style="font-size:11px;">Gemini</div>
    <div class="node" style="font-size:11px;">Windsurf</div>
  </div>
  <div class="card" style="margin-top: 24px;">
    <h4>Zero-config for Copilot</h4>
    <p style="font-size:15px;">
      <code>apm install</code> writes <code>.github/copilot-instructions.md</code>, <code>.github/prompts/</code>, <code>.github/instructions/</code>, and <code>.vscode/mcp.json</code>. VS Code and GitHub Copilot read all of these automatically — no settings to flip. APM itself dogfoods the Copilot target.
    </p>
  </div>
  <p style="font-size:13px; color:var(--cp-text-muted); margin-top: 12px;">
    The same install also emits <code>AGENTS.md</code> in the repo root — the open <a href="https://agents.md" style="color:var(--cp-link)">agents.md</a> standard that Claude Code, Cursor, OpenCode, Codex, Gemini, and Windsurf all read. <strong>You don't have to use them; if a teammate does, their agent is already configured.</strong>
  </p>
</section>

<section class="slide">
  <div class="eyebrow">Interactive demo</div>
  <h1>Assemble an <code>agents.md</code> from APM packages</h1>
  <h3>Pick the packages your project needs. See what gets generated.</h3>
  <div class="two-col full">
    <div class="col">
      <div style="margin-bottom: 8px; font-weight:600;">Available packages</div>
      <div class="pick-list" id="pkgList"></div>
      <div style="margin-top: 18px; font-weight:600;">Generated <code>apm.yml</code></div>
      <pre class="code" id="ymlOut" style="margin-top: 6px;"></pre>
    </div>
    <div class="col">
      <div style="margin-bottom: 8px; font-weight:600; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <span>Generated <code>AGENTS.md</code></span>
        <span class="chip" id="lineCount">0 lines</span>
      </div>
      <pre class="terminal" style="padding:10px 14px; font-size:13px; margin-bottom:8px;"><span class="muted">$</span> <span class="prompt">apm install</span>   <span class="muted"># deploys primitives + writes AGENTS.md</span></pre>

      <div style="font-size:12px; color:var(--cp-text-muted); margin-top:6px;">

<section class="slide">
  <div class="eyebrow">Plugins &amp; bundles</div>
  <h1>Why plugins? Because a real capability is more than one file.</h1>
  <h3>A skill is one primitive. A workflow needs several primitives bundled together.</h3>
  <div class="two-col" style="margin-top: 4px;">
    <div class="col">
      <h2>Concrete example</h2>
      <p style="color:var(--cp-text-muted); margin: 4px 0 10px;">A <strong>Code Review</strong> plugin your platform team wants every repo to have:</p>
      <ul style="margin-top: 0;">
        <li>📜 <strong>Instructions</strong> — review rubric (security, perf, naming)</li>
        <li>🤖 <strong>Agent</strong> — <code>code-reviewer.agent.md</code> activated by <code>/review</code></li>
        <li>🧰 <strong>Skill</strong> — "summarise diff" + "find missing tests"</li>
        <li>🔌 <strong>MCP server</strong> — <code>github-mcp-server</code> for posting PR comments</li>
      </ul>
      <p style="font-size:14px; color:var(--cp-text-muted); margin-top: 8px;">
        Without a bundle, every dev wires four files by hand. <strong>With <code>apm install acme/code-review</code>, all four primitives drop into the right places under <code>.github/</code> and <code>.vscode/</code> in one command — pinned in <code>apm.lock.yaml</code>.</strong>
      </p>
      <h2 style="margin-top:16px;">Marketplaces</h2>
      <p style="color:var(--cp-text-muted); font-size:14px; margin:0;">Curated registries of packages. <code>apm marketplace add</code> + one <code>apm install</code>, lockfile-pinned. <code>apm pack</code> emits <code>marketplace.json</code> alongside the bundle when your manifest declares one.</p>
    </div>
    <div class="col">
      <pre class="code" style="font-size:13px;"><span class="cmt"># package layout — primitives live in .apm/, not in apm.yml</span>
acme/code-review/
├── apm.yml                       <span class="cmt"># name, version, dependencies</span>
├── .apm/
│   ├── instructions/rubric.instructions.md
│   ├── agents/code-reviewer.agent.md
│   ├── skills/summarise-diff/SKILL.md
│   └── skills/find-missing-tests/SKILL.md
└── README.md

<span class="cmt"># apm.yml declares only deps, not the primitives themselves</span>
<span class="kw">name</span>: code-review
<span class="kw">version</span>: 1.2.0
<span class="kw">dependencies</span>:
  <span class="kw">apm</span>:
    - acme/shared-style-guide<span class="str">#v3</span>   <span class="cmt"># transitive dep</span>
  <span class="kw">mcp</span>:
    - io.github.github/github-mcp-server</pre>

      <pre class="code" style="margin-top:12px; font-size:13px;"><span class="cmt"># consume it from any repo</span>
<span class="kw">$</span> apm install acme/code-review<span class="str">#v1.2.0</span>

<span class="cmt"># or pack a single-file bundle for offline / air-gapped delivery</span>
<span class="kw">$</span> apm pack <span class="cmt"># → build/code-review/ (plugin.json + agents/ + skills/ + commands/ + hooks/ + apm.lock.yaml)</span>
<span class="kw">$</span> apm pack --archive <span class="cmt"># → build/code-review-1.2.0.tar.gz</span></pre>
    </div>
  </div>
</section>

<section class="slide">
  <div class="eyebrow">Security</div>
  <h1>Treat prompts like the programs they are</h1>
  <div class="grid">
    <div class="card"><h4>Unicode scanning</h4><p>Every install blocks hidden bidi / zero-width characters that can hijack agent behavior.</p></div>
    <div class="card"><h4>Lockfile integrity</h4><p><code>apm.lock.yaml</code> records resolved sources and content hashes — full provenance, drift-proof installs. Bundles embed it too, so <code>apm install &lt;bundle&gt;</code> rehashes every file before writing.</p></div>
    <div class="card"><h4>MCP trust gating</h4><p>Transitive MCP servers don't get installed unless explicitly declared or trusted.</p></div>
    <div class="card"><h4>apm audit</h4><p>On-demand scan for compromised packages, hidden chars, lockfile drift. CI-friendly.</p></div>
    <div class="card"><h4>Drift detection</h4><p>Detects when generated files diverge from what the manifest says — fail the build instead of shipping silently.</p></div>
    <div class="card"><h4>CI/CD ready</h4><p>Official <code>microsoft/apm-action</code> for GitHub Actions. Plug it into PR checks.</p></div>
  </div>
</section>

<section class="slide">
  <div class="eyebrow">Governance</div>
  <h1>One policy file. Tighten-only inheritance.</h1>
  <div class="two-col full">
    <div class="col">
      <h2>How it flows</h2>
      <div class="flow" style="margin-top: 16px;">
        <div class="node accent">Enterprise<br/>apm-policy.yml</div>
        <span class="arrow">→</span>
        <div class="node accent">Org<br/>apm-policy.yml</div>
        <span class="arrow">→</span>
        <div class="node accent">Repo<br/>apm-policy.yml</div>
      </div>
      <p style="margin-top: 18px; color: var(--cp-text-muted);">
        Each level can only <em>tighten</em> the policy, never loosen it. Enforced at <code>apm install</code> time — including transitive dependencies and MCP servers.
      </p>
    </div>
    <div class="col">
      <pre class="code" style="font-size:13px;"><span class="cmt"># <org>/.github/apm-policy.yml — auto-discovered for every repo in the org</span>
<span class="kw">name</span>: <span class="str">"Contoso Engineering Policy"</span>
<span class="kw">version</span>: <span class="str">"1.0.0"</span>
<span class="kw">enforcement</span>: block          <span class="cmt"># warn | block | off</span>

<span class="kw">dependencies</span>:
  <span class="kw">allow</span>:
    - <span class="str">"contoso/**"</span>
    - <span class="str">"microsoft/*"</span>
  <span class="kw">deny</span>:
    - <span class="str">"untrusted-org/**"</span>
  <span class="kw">require</span>:
    - contoso/agent-standards     <span class="cmt"># every repo must pull this</span>
  <span class="kw">max_depth</span>: 5                  <span class="cmt"># cap transitive depth</span>
  <span class="kw">require_pinned_constraint</span>: true   <span class="cmt"># ban floating refs</span>

<span class="kw">mcp</span>:
  <span class="kw">allow</span>:
    - <span class="str">"io.github.github/*"</span>
  <span class="kw">transport</span>:
    <span class="kw">allow</span>: [stdio, streamable-http]
  <span class="kw">self_defined</span>: warn           <span class="cmt"># ad-hoc MCP entries warn</span>

<span class="kw">compilation</span>:
  <span class="kw">target</span>:
    <span class="kw">allow</span>: [copilot]              <span class="cmt"># copilot is an alias for vscode</span></pre>
      <p style="font-size:12px; color:var(--cp-text-muted); margin-top: 6px;">
        Wire <code>apm audit --ci --policy org</code> into PR checks — produces SARIF, renders inline on the PR diff via GitHub Code Scanning. Note: package signing is not yet implemented; lockfile presence is enforced as a baseline audit check (<code>lockfile-exists</code>), not a policy field.

const deck = document.getElementById('deck');

const all = Array.from(deck.querySelectorAll('.slide'));
let idx = 0;

function show(i) {
  idx = Math.max(0, Math.min(all.length - 1, i));
  all.forEach((s, n) => s.classList.toggle('active', n === idx));
  document.getElementById('counter').textContent = `${idx + 1} / ${all.length}`;

  if (all[idx].querySelector('#cliTerm')) initCliDemo();

}

document.getElementById('prev').onclick = () => show(idx - 1);
document.getElementById('next').onclick = () => show(idx + 1);
document.getElementById('theme').onclick = toggleTheme;
document.getElementById('helpBtn').onclick = () => document.getElementById('help').classList.toggle('open');

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
}

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, select')) return;
  switch (e.key) {
    case 'ArrowRight': case 'PageDown': case ' ': show(idx + 1); break;
    case 'ArrowLeft': case 'PageUp': show(idx - 1); break;
    case 'Home': show(0); break;
    case 'End': show(all.length - 1); break;
    case 'f': case 'F':
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
      break;
    case 't': case 'T': toggleTheme(); break;
    case '?': document.getElementById('help').classList.toggle('open'); break;
  }
});

// Deep link from hash
const hash = parseInt(location.hash.replace('#', ''), 10);
show(Number.isFinite(hash) && hash > 0 ? hash - 1 : 0);

  },
  {
    id: 'playwright-mcp',
    label: 'playwright-mcp',
    source: 'io.github.microsoft/playwright-mcp',
    kind: 'mcp',
    md: `## MCP: playwright-mcp
- Available tools: browser_navigate, browser_click, browser_snapshot.
- Use for end-to-end test authoring and debugging.`
  },
];
const selected = new Set(['review-and-refactor', 'context-engineering', 'github-mcp']);

function renderPicks() {
  const wrap = document.querySelector('#pkgList');
  if (!wrap) return;
  wrap.innerHTML = '';
  PACKAGES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pick' + (selected.has(p.id) ? ' on' : '');
    btn.innerHTML = `<span class="chip" style="margin-right:6px">${p.kind}</span>${p.label}`;
    btn.onclick = () => {
      if (selected.has(p.id)) selected.delete(p.id); else selected.add(p.id);
      renderPicks(); renderOutputs();
    };
    wrap.appendChild(btn);
  });
}
function renderOutputs() {
  const apmDeps = PACKAGES.filter(p => selected.has(p.id) && p.kind !== 'mcp');
  const mcpDeps = PACKAGES.filter(p => selected.has(p.id) && p.kind === 'mcp');
  const yml =
`name: my-project
version: 1.0.0
dependencies:
  apm:` +
    (apmDeps.length ? '\n' + apmDeps.map(p => `    - ${p.source}`).join('\n') : ' []') +
`
  mcp:` +
    (mcpDeps.length ? '\n' + mcpDeps.map(p => `    - ${p.source}`).join('\n') : ' []');

  const md =
`# AGENTS.md
Generated by \`apm compile\` from apm.yml.

` + PACKAGES.filter(p => selected.has(p.id)).map(p => p.md).join('\n\n') +
(selected.size === 0 ? '\n_(no packages selected)_' : '');

  document.querySelector('#ymlOut').textContent = yml;
  document.querySelector('#mdOut').textContent = md;
  document.querySelector('#lineCount').textContent = `${md.split('\n').length} lines`;
}
function initPkgDemo() {
  renderPicks();
  renderOutputs();
}
</script>
</body>
</html>
